<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StreamVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-screen">
  <div class="login-box">
    <div class="login-logo">Stream<span>Vault</span></div>
    <div class="login-sub">Din personliga mediaserver</div>
    <input class="l-input" id="l-user" type="text" placeholder="Användarnamn" autocomplete="username"/>
    <input class="l-input" id="l-pass" type="password" placeholder="Lösenord" autocomplete="current-password"/>
    <div class="l-error" id="l-error"></div>
    <button class="l-btn" onclick="login()">Logga in</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-logo" onclick="switchSection('home')">Stream<span>Vault</span></div>
    <div class="sb-nav" id="sb-nav">
      <!-- Libraries injected here by loadSidebarLibraries() -->
      <div id="sb-libraries"></div>
    </div>
    <div class="sb-user" onclick="toggleUserMenu()">
      <div class="user-avatar" id="userAvatar">?</div>
      <span id="userName">Användare</span>
      <div class="user-menu" id="userMenu" style="display:none">
        <div class="um-item" onclick="switchSection('settings')">⚙️ Inställningar</div>
        <div class="um-item" onclick="loadUserPage(currentUser?.id)">👤 Min profil</div>
        <div class="um-item" onclick="logout()">🚪 Logga ut</div>
      </div>
    </div>
  </div>

  <!-- TOPBAR -->
  <div id="topbar">
    <input class="topbar-search" id="topbar-search-input" type="text" placeholder="🔍 Sök filmer, serier, skådespelare..." oninput="handleTopbarSearch()" onfocus="switchSection('search')" />
    <button onclick="switchSection('settings')" id="sb-settings" style="margin-left:auto;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:8px 12px;border-radius:8px;transition:color 0.2s" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">⚙️</button>
  </div>

  <!-- MAIN CONTENT -->
  <main id="appMain">
    <section id="sec-home" class="section active"></section>
    <section id="sec-movies" class="section"></section>
    <section id="sec-tvshows" class="section"></section>
    <section id="sec-music" class="section"></section>
    <section id="sec-search" class="section"></section>
    <section id="sec-settings" class="section"></section>
    <section id="sec-library" class="section"></section>
    <section id="sec-collections" class="section"></section>
    <section id="sec-detail" class="section"></section>
  </main>

</div>

<!-- PLAYER -->
<div id="player-bar" style="display:none">
  <video id="main-video"></video>
  <div class="custom-controls" id="custom-controls">
    <div class="ctrl-progress-wrap">
      <div class="ctrl-progress-bg" id="ctrl-progress-bg">
        <div class="ctrl-buffer-fill" id="ctrl-buffer-fill"></div>
        <div class="ctrl-progress-fill" id="ctrl-progress-fill"></div>
        <input class="ctrl-seek" id="ctrl-seek" type="range" min="0" max="1000" value="0"/>
        <div class="ctrl-hover-time" id="ctrl-hover-time"></div>
      </div>
      <span class="ctrl-time" id="ctrl-time">0:00 / 0:00</span>
    </div>
    <div class="ctrl-row">
      <div class="pb-info">
        <div class="pb-title" id="pb-title"></div>
        <div class="pb-sub" id="pb-sub"></div>
      </div>
      <button class="ctrl-btn" id="ctrl-play" onclick="togglePlay()">⏸</button>
      <button class="ctrl-btn" onclick="skipTime(-10)">⏮ 10s</button>
      <button class="ctrl-btn" onclick="skipTime(10)">10s ⏭</button>
      <div class="ctrl-vol">
        <button class="ctrl-btn" onclick="toggleMute()">🔊</button>
        <input id="ctrl-volume" type="range" min="0" max="100" value="100" oninput="setVolume(this.value)"/>
      </div>
      <button class="ctrl-btn" onclick="toggleFullscreen()">⛶</button>
      <button class="ctrl-btn ctrl-close" onclick="closePlayer()">✕</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
